<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>番茄钟</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="番茄钟">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon.svg">
<style>
  :root {
    --accent-work: #ff6b8a;
    --accent-short: #6bff90;
    --accent-long: #6bb5ff;
    --bg: #1a1a2e;
    --surface: #0f3460;
    --text: #e0e0ff;
    --text-dim: #8888a0;
    --ring-bg: #2a2a4a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; user-select: none;
  }
  .app { width: 480px; padding: 24px 20px; text-align: center; }
  h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
  .stats { font-size: 12px; color: var(--text-dim); margin-bottom: 14px; }
  .task-wrap { display: flex; background: var(--surface); border-radius: 10px; margin-bottom: 12px; overflow: hidden; }
  .task-wrap input { flex:1; background: transparent; border: none; color: var(--text); font-size: 15px; padding: 10px 14px; outline: none; }
  .task-wrap input::placeholder { color: #666; }
  .task-wrap button { background: transparent; border: none; color: #888; font-size: 16px; padding: 0 14px; cursor: pointer; }
  .modes { display: flex; gap: 10px; margin-bottom: 18px; justify-content: center; }
  .mode-btn { padding: 10px 22px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .mode-btn[data-mode="work"]        { background: var(--ring-bg); color: var(--accent-work); }
  .mode-btn[data-mode="short_break"] { background: var(--ring-bg); color: var(--accent-short); }
  .mode-btn[data-mode="long_break"]  { background: var(--ring-bg); color: var(--accent-long); }
  .mode-btn.active[data-mode="work"]        { background: var(--accent-work); color: var(--bg); }
  .mode-btn.active[data-mode="short_break"] { background: var(--accent-short); color: var(--bg); }
  .mode-btn.active[data-mode="long_break"]  { background: var(--accent-long); color: var(--bg); }
  .clock-container { position: relative; width: 320px; height: 320px; margin: 0 auto 16px; }
  svg { width: 320px; height: 320px; }
  .dots { display: flex; gap: 12px; justify-content: center; margin-bottom: 16px; align-items: center; }
  .dots span { font-size: 12px; color: var(--text-dim); }
  .dot { font-size: 22px; color: #444; transition: color 0.3s; }
  .dot.filled { color: var(--accent-work); }
  .controls { display: flex; gap: 14px; justify-content: center; margin-bottom: 14px; }
  .ctrl-btn { padding: 14px 38px; border-radius: 14px; border: none; font-size: 17px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
  .btn-start { background: var(--ring-bg); color: var(--accent-short); }
  .btn-start.running { background: var(--ring-bg); color: #ffe08a; }
  .btn-reset { background: var(--ring-bg); color: var(--accent-work); }
  .ctrl-btn:hover { filter: brightness(1.2); }
  .pin-btn { background: transparent; border: none; color: #888; font-size: 11px; cursor: pointer; padding: 6px 12px; }
  .pin-btn.pinned { color: #ffe08a; }
  .tip { font-size: 10px; color: #555; margin-top: 10px; }
  @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.05)} 100%{transform:scale(1)} }
  .pop { animation: pop 0.4s ease; }
</style>
</head>
<body>
<div class="app">
  <h1>番茄钟</h1>
  <div class="stats" id="stats"></div>
  <div class="task-wrap">
    <input type="text" id="taskInput" placeholder="输入任务名称..." autocomplete="off">
    <button onclick="clearTask()">✕</button>
  </div>
  <div class="modes">
    <button class="mode-btn active" data-mode="work" onclick="switchMode('work')">专注</button>
    <button class="mode-btn" data-mode="short_break" onclick="switchMode('short_break')">短休息</button>
    <button class="mode-btn" data-mode="long_break" onclick="switchMode('long_break')">长休息</button>
  </div>
  <div class="clock-container" id="clockContainer">
    <svg id="clockSvg" viewBox="0 0 320 320">
      <g id="staticLayer"></g>
      <g id="dynamicLayer"></g>
    </svg>
  </div>
  <div class="dots">
    <span>本轮</span><span class="dot" id="dot0">○</span><span class="dot" id="dot1">○</span><span class="dot" id="dot2">○</span><span class="dot" id="dot3">○</span>
  </div>
  <div class="controls">
    <button class="ctrl-btn btn-start" id="btnStart" onclick="toggle()">▶  开始</button>
    <button class="ctrl-btn btn-reset" onclick="reset()">↺  重置</button>
  </div>
  <button class="pin-btn" id="pinBtn" onclick="togglePin()">📌 置顶</button>
  <div class="tip">空格键 开始/暂停 · Esc 重置</div>
</div>

<script>
const WORK = 25 * 60, SHORT = 5 * 60, LONG = 15 * 60, SESSIONS_BEFORE_LONG = 4;
const CX = 160, CY = 160, R = 138, RING_W = 12, R_PROG = R + RING_W / 2;

const DURATION = { work: WORK, short_break: SHORT, long_break: LONG };
const ACCENT = { work: '#ff6b8a', short_break: '#6bff90', long_break: '#6bb5ff' };
const LABEL  = { work: '专注中', short_break: '短休息', long_break: '长休息' };
const CSS_MODE = { work: 'work', short_break: 'short_break', long_break: 'long_break' };

let mode = 'work', remaining = WORK, running = false, completed = 0;
let timerId = null, endTime = 0, rAFId = null;
let pinned = JSON.parse(localStorage.getItem('pomodoro_pinned') || 'false');

let history = JSON.parse(localStorage.getItem('pomodoro_history') || '{"sessions":[]}');
let todayCount = history.sessions.filter(s => s.date === ymd()).length;

function ymd() { return new Date().toISOString().slice(0, 10); }

// ── Static clock elements (rendered once) ────────────────
function initClock() {
  const layer = document.getElementById('staticLayer');
  let h = '';

  // background circle
  h += `<circle cx="${CX}" cy="${CY}" r="${R}" fill="none" stroke="${getComputedStyle(document.documentElement).getPropertyValue('--ring-bg').trim() || '#2a2a4a'}" stroke-width="3"/>`;

  // hour ticks + numbers
  for (let hr = 0; hr < 12; hr++) {
    const a = hr * 30;
    const p1 = polar(a, R - 18);
    const p2 = polar(a, R);
    h += `<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="#c0c0e0" stroke-width="4" stroke-linecap="round"/>`;
    const pn = polar(a, R - 36);
    h += `<text x="${pn.x}" y="${pn.y + 6}" text-anchor="middle" fill="#c0c0e0" font-size="16" font-weight="700">${hr === 0 ? 12 : hr}</text>`;
  }

  // minute ticks
  for (let m = 0; m < 60; m++) {
    if (m % 5 === 0) continue;
    const p1 = polar(m * 6, R - 8);
    const p2 = polar(m * 6, R);
    h += `<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="#555" stroke-width="1"/>`;
  }

  layer.innerHTML = h;
}

function polar(deg, radius) {
  const a = (deg - 90) * Math.PI / 180;
  return { x: CX + radius * Math.cos(a), y: CY + radius * Math.sin(a) };
}

// ── Dynamic clock update (per tick) ──────────────────────
function updateClock(progress) {
  const layer = document.getElementById('dynamicLayer');
  const accent = ACCENT[mode];
  const dashLen = 2 * Math.PI * R_PROG;
  const dashProg = dashLen * progress;

  let h = '';

  // progress ring
  h += `<circle cx="${CX}" cy="${CY}" r="${R_PROG}" fill="none" stroke="#2a2a4a" stroke-width="${RING_W}"/>`;
  if (progress > 0.001) {
    h += `<circle cx="${CX}" cy="${CY}" r="${R_PROG}" fill="none"
          stroke="${accent}" stroke-width="${RING_W}"
          stroke-dasharray="${dashProg} ${dashLen - dashProg}"
          stroke-dashoffset="${dashLen * 0.25}" transform="rotate(-90 ${CX} ${CY})"/>`;
  }

  // hand
  if (progress > 0 || progress <= 1) {
    const handDeg = (1 - progress) * 360;
    const tip = polar(handDeg, R - 44);
    h += `<line x1="${CX+2}" y1="${CY+2}" x2="${tip.x+2}" y2="${tip.y+2}" stroke="#000" stroke-width="6" stroke-linecap="round"/>`;
    h += `<line x1="${CX}" y1="${CY}" x2="${tip.x}" y2="${tip.y}" stroke="${accent}" stroke-width="6" stroke-linecap="round"/>`;
    h += `<circle cx="${CX}" cy="${CY}" r="10" fill="none" stroke="${accent}" stroke-width="3"/>`;
    h += `<circle cx="${CX}" cy="${CY}" r="4" fill="${accent}"/>`;
  }

  // digital time
  const mins = Math.floor(remaining / 60);
  const secs = remaining % 60;
  h += `<text x="${CX}" y="${CY - 45}" text-anchor="middle" fill="#e0e0ff" font-size="44" font-weight="700">${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}</text>`;
  h += `<text x="${CX}" y="${CY + 32}" text-anchor="middle" fill="#8888a0" font-size="14">${LABEL[mode]}</text>`;

  layer.innerHTML = h;
}

function fullRedraw() {
  updateClock(remaining / DURATION[mode]);
}

// ── Timer ────────────────────────────────────────────────
function toggle() { running ? stop() : start(); }

function start() {
  running = true;
  endTime = Date.now() + remaining * 1000;
  document.getElementById('btnStart').textContent = '⏸  暂停';
  document.getElementById('btnStart').classList.add('running');
  scheduleTick();
}

function stop() {
  running = false;
  clearTimeout(timerId); timerId = null;
  if (rAFId) { cancelAnimationFrame(rAFId); rAFId = null; }
  document.getElementById('btnStart').textContent = '▶  开始';
  document.getElementById('btnStart').classList.remove('running');
}

function reset() {
  stop();
  remaining = DURATION[mode];
  fullRedraw();
}

function scheduleTick() {
  if (!running) return;
  timerId = setTimeout(() => {
    const secsLeft = Math.max(0, Math.round((endTime - Date.now()) / 1000));
    remaining = secsLeft;
    if (secsLeft <= 0) { complete(); return; }
    updateClock(secsLeft / DURATION[mode]);
    scheduleTick();
  }, 250);
}

function complete() {
  stop();
  playSound();

  if (mode === 'work') {
    completed++;
    history.sessions.push({ date: ymd(), task: document.getElementById('taskInput').value.trim(), time: new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'}) });
    if (history.sessions.length > 500) history.sessions = history.sessions.slice(-500);
    localStorage.setItem('pomodoro_history', JSON.stringify(history));
    todayCount = history.sessions.filter(s => s.date === ymd()).length;
    document.getElementById('stats').textContent = `今日已完成 ${todayCount} 个番茄`;
    updateDots();
    switchMode(completed % SESSIONS_BEFORE_LONG === 0 ? 'long_break' : 'short_break');
  } else {
    switchMode('work');
  }

  const el = document.getElementById('clockContainer');
  el.classList.add('pop');
  setTimeout(() => el.classList.remove('pop'), 400);
}

// ── Mode / UI ────────────────────────────────────────────
function switchMode(m) {
  if (m === mode) return;
  stop();
  mode = m;
  remaining = DURATION[m];
  updateModeButtons();
  updateDots();
  fullRedraw();
}

function updateModeButtons() {
  const btns = document.querySelectorAll('.mode-btn');
  btns.forEach(b => b.classList.remove('active'));
  const target = document.querySelector(`.mode-btn[data-mode="${CSS_MODE[mode]}"]`);
  if (target) target.classList.add('active');
}

function updateDots() {
  const c = completed % SESSIONS_BEFORE_LONG;
  for (let i = 0; i < SESSIONS_BEFORE_LONG; i++) {
    const el = document.getElementById('dot' + i);
    el.className = 'dot' + (i < c ? ' filled' : '');
    el.textContent = i < c ? '●' : '○';
  }
}

function clearTask() { document.getElementById('taskInput').value = ''; }

function togglePin() {
  pinned = !pinned;
  localStorage.setItem('pomodoro_pinned', JSON.stringify(pinned));
  const btn = document.getElementById('pinBtn');
  btn.textContent = pinned ? '📌 已置顶' : '📌 置顶';
  btn.className = pinned ? 'pin-btn pinned' : 'pin-btn';
}

// ── Sound ────────────────────────────────────────────────
let _audioCtx = null;
function playSound() {
  try {
    if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = _audioCtx.createOscillator();
    const gain = _audioCtx.createGain();
    osc.connect(gain); gain.connect(_audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, _audioCtx.currentTime);
    osc.frequency.setValueAtTime(1100, _audioCtx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.3, _audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, _audioCtx.currentTime + 0.5);
    osc.start(_audioCtx.currentTime); osc.stop(_audioCtx.currentTime + 0.5);
  } catch(e) { console.warn('playSound failed:', e); }
}

// ── Keyboard ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && document.activeElement !== document.getElementById('taskInput')) { e.preventDefault(); toggle(); }
  if (e.code === 'Escape') { e.preventDefault(); reset(); }
});

// ── Init ─────────────────────────────────────────────────
initClock();
fullRedraw();
updateModeButtons();
updateDots();
document.getElementById('stats').textContent = `今日已完成 ${todayCount} 个番茄`;
document.getElementById('pinBtn').textContent = pinned ? '📌 已置顶' : '📌 置顶';
document.getElementById('pinBtn').className = pinned ? 'pin-btn pinned' : 'pin-btn';
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
</script>
</body>
</html>
